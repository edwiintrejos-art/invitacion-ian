<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Invitación de Ian!</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #111;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
            text-align: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .cinema-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, #222 0%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 🎬 CORTINAS SIMPLIFICADAS */
        .curtain {
            position: absolute;
            top: 0;
            width: 50vw;
            height: 100vh;
            background-color: #990000;
            z-index: 10;
            transition: transform 1.5s ease-in-out;
            border-bottom: 20px solid #d4af37;
        }
        .curtain-left { left: 0; border-right: 4px solid #d4af37; }
        .curtain-right { right: 0; border-left: 4px solid #d4af37; }

        .open-left { transform: translateX(-100%); }
        .open-right { transform: translateX(100%); }

        /* PANTALLA INICIAL AUTOMÁTICA */
        .start-screen {
            position: absolute;
            z-index: 20;
            background-color: #111;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .start-btn {
            padding: 20px 30px;
            font-family: 'Press Start 2P', cursive;
            font-size: 16px;
            background-color: #fcdf11;
            color: #000;
            border: 4px solid #fff;
            cursor: pointer;
            box-shadow: 0 0 15px #fcdf11;
        }

        /* 👦 TEXTOS ANIMADOS */
        .title-ian {
            font-size: 40px;
            color: #fcdf11;
            text-shadow: 4px 4px #00529b;
            margin-bottom: 20px;
            display: none;
            animation: jump 0.6s infinite alternate;
        }
        @keyframes jump {
            to { transform: translateY(-15px); }
        }

        .subtitle { font-size: 12px; margin-bottom: 40px; line-height: 1.8; display: none; padding: 0 10px; }

        /* 🎟️ BOTONES */
        .btn-container { display: none; gap: 20px; z-index: 5; }
        .btn { padding: 15px 25px; font-family: 'Press Start 2P', cursive; font-size: 12px; border: 3px solid #fff; cursor: pointer; }
        .btn-yes { background-color: #4cd137; color: white; }
        .btn-no { background-color: #e84118; color: white; position: relative; }

        /* 🍿 LLUVIA DE OBJETOS */
        .falling { position: absolute; top: -50px; z-index: 2; font-size: 24px; pointer-events: none; animation: fall 4s linear forwards; }
        @keyframes fall { to { transform: translateY(105vh) rotate(360deg); } }

        /* 🍌 MINIONS MÓVILES */
        .minion-walker {
            position: absolute;
            bottom: 20px;
            left: -100px;
            font-size: 35px;
            z-index: 3;
            display: none;
            animation: walk 10s linear infinite;
        }
        @keyframes walk { to { left: 110vw; } }

        /* 🎟️ INTERFAZ DEL BOLETO FINAL */
        .ticket {
            display: none;
            position: absolute;
            background: #fff;
            color: #000;
            padding: 20px;
            border: 4px dashed #000;
            width: 85%;
            max-width: 360px;
            box-shadow: 0 0 25px #fcdf11;
            z-index: 15;
            transform: rotate(-2deg);
        }
        .ticket h2 { font-size: 14px; margin-bottom: 15px; color: #00529b; }
        .ticket p { font-size: 10px; margin: 10px 0; text-align: left; line-height: 1.4; }

        /* 🎆 EFECTOS DE FUEGOS ARTIFICIALES POP-UP */
        .confetti { position: absolute; width: 8px; height: 8px; z-index: 12; pointer-events: none; animation: fall 2s linear forwards; }
    </style>
</head>
<body>

    <!-- Pantalla de inicio -->
    <div class="start-screen" id="startScreen">
        <h2 style="font-size: 14px; margin-bottom: 30px; color: #fcdf11; padding: 0 10px;">INVITACIÓN A CINE</h2>
        <button class="start-btn" onclick="startEverything()">¡ACEPTAR! 🎬🎥</button>
    </div>

    <!-- Sonido opcional encapsulado de forma segura -->
    <audio id="bgMusic" loop preload="auto">
        <source src="https://google.com" type="audio/ogg">
    </audio>

    <div class="cinema-container">
        <div class="curtain curtain-left" id="curtainLeft"></div>
        <div class="curtain curtain-right" id="curtainRight"></div>

        <h1 class="title-ian" id="titleIan">¡IAN! 👦</h1>
        <div class="subtitle" id="subtitle">
            <p>VAMOS A VER Minions & monstruos</p>
            <p style="color: #fcdf11; margin-top: 15px;">¿VIENES A LA FUNCIÓN?</p>
        </div>

        <div class="btn-container" id="btnContainer">
            <button class="btn btn-yes" onclick="showTicket()">SÍ, IRÉ 🎟️</button>
            <button class="btn btn-no" id="btnNo" onmouseover="moveNoButton()" onclick="moveNoButton()">NO</button>
        </div>

        <div class="minion-walker" id="minion">Astronomía 🏃‍♂️🍌</div>

        <!-- Boleto final de cine -->
        <div class="ticket" id="ticket">
            <h2>🎟️ PASE VIP DE CINE 🎟️</h2>
            <hr style="border: 1px dashed #000; margin: 10px 0;">
            <p><strong>PELÍCULA:</strong> Minions & monstruos</p>
            <p><strong>FECHA:</strong> Domingo, 19 de JULIO</p>
            <p><strong>HORA:</strong> 11:10 PM</p>
            <p><strong>LUGAR:</strong> CineMark</p>
            <hr style="border: 1px dashed #000; margin: 10px 0;">
            <p style="text-align:center; font-size:14px; letter-spacing: 3px;">|||| || |||| |||</p>
            <p style="text-align:center; font-size:7px; color:gray; margin-top: 5px;">CÓDIGO: IAN-7-CINE</p>
        </div>
    </div>

    <script>
        function startEverything() {
            document.getElementById('startScreen').style.display = 'none';

            document.getElementById('curtainLeft').classList.add('open-left');
            document.getElementById('curtainRight').classList.add('open-right');

            try {
                document.getElementById('bgMusic').play();
            } catch(e) {
                console.log("Audio omitido por restricción del sistema");
            }

            setTimeout(() => {
                document.getElementById('titleIan').style.display = 'block';
                document.getElementById('subtitle').style.display = 'block';
                document.getElementById('btnContainer').style.display = 'flex';
                document.getElementById('minion').style.display = 'block';
                
                setInterval(dropElements, 400);
            }, 1000);
        }

        function dropElements() {
            const elements = ['🍿', '🍌', '🎬', '✨'];
            const drop = document.createElement('div');
            drop.classList.add('falling');
            drop.innerText = elements[Math.floor(Math.random() * elements.length)];
            drop.style.left = Math.random() * 90 + 'vw';
            document.body.appendChild(drop);
            setTimeout(() => drop.remove(), 4000);
        }

        function moveNoButton() {
            const btn = document.getElementById('btnNo');
            const newX = Math.random() * 160 - 80;
            const newY = Math.random() * 160 - 80;
            btn.style.transform = `translate(${newX}px, ${newY}px)`;
        }

        function showTicket() {
            document.getElementById('btnContainer').style.display = 'none';
            document.getElementById('subtitle').style.display = 'none';
            document.getElementById('ticket').style.display = 'block';
            
            setInterval(spawnConfetti, 100);
        }

        function spawnConfetti() {
            const colors = ['#fcdf11', '#00529b', '#ff4757', '#2ed573', '#ffffff'];
            const confetti = document.createElement('div');
            confetti.classList.add('confetti');
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.top = '-10px';
            confetti.style.animationDuration = (Math.random() * 2 + 1) + 's';
            document.body.appendChild(confetti);
            setTimeout(() => confetti.remove(), 2000);
        }
    </script>
</body>
</html>
